x-airflow-common:
  &airflow-common
  image: apache/airflow:2.11.2-python3.11
  env_file:
    - .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      requests
      duckdb
      pyarrow
      pyyaml
      dbt-duckdb
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./simulator:/opt/airflow/simulator
    - ./dbt_fintech:/opt/airflow/dbt_fintech
    - ./duckdb:/opt/airflow/duckdb
    - ./data:/opt/airflow/data
    - ./data_lake:/opt/airflow/data_lake
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        airflow db migrate && \
        airflow users create \
          --role Admin \
          --username admin \
          --password admin \
          --firstname Fintech \
          --lastname Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  simulator:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    command:
      - /bin/bash
      - -lc
      - pip install --no-cache-dir fastapi uvicorn pyyaml && uvicorn api_server:app --host 0.0.0.0 --port 8000
    volumes:
      - ./simulator:/app
    ports:
      - "8000:8000"
